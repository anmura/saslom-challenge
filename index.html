<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Задания игроков</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ticker">ВЫБЕРИ ИГРОКА • ВЫПОЛНЯЙ ЗАДАНИЯ • СОХРАНЯЕТСЯ АВТОМАТИЧЕСКИ</div>
    <main class="app-shell">
      <section class="topbar" aria-label="Панель игрока">
        <div>
          <p class="eyebrow">Игровой лист</p>
          <h1>Задания</h1>
        </div>

        <div class="score" aria-live="polite">
          <span id="completedCount">0</span>
          <small>выполнено</small>
        </div>
      </section>

      <section class="player-panel" aria-label="Выбор игрока">
        <div class="panel-label">>> ИГРОК:</div>
        <div class="player-chips" id="playerChips" role="listbox" aria-label="Игроки">
          <button class="player-chip" type="button" disabled>Загрузка...</button>
        </div>
      </section>

      <section class="status" id="status" role="status">Подключаемся к хранилищу...</section>

      <section class="tasks" id="tasks" aria-label="Список заданий"></section>
    </main>

    <template id="taskTemplate">
      <article class="task">
        <label class="task-check">
          <input type="checkbox" />
          <span class="box" aria-hidden="true"></span>
        </label>
        <div class="task-body">
          <span class="task-number"></span>
          <p class="task-text"></p>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
